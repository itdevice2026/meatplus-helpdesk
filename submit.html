<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Submit a Ticket · MeatPlus IT Helpdesk</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#0f1419; --panel:#1a212b; --panel2:#222c38; --line:#2d3845;
    --txt:#e6edf3; --muted:#8b98a5; --accent:#3b82f6; --accent2:#2563eb;
    --green:#22c55e; --red:#ef4444; --purple:#a855f7;
  }
  html[data-theme=light]{--bg:#eef2f7;--panel:#ffffff;--panel2:#f3f6fa;--line:#dbe3ec;--txt:#0f172a;--muted:#5b6b7c;--accent:#2563eb;--accent2:#1d4ed8}
  html[data-theme=blue]{--bg:#0b1220;--panel:#111c33;--panel2:#16243f;--line:#243a5e;--txt:#e6edf6;--muted:#8da2c0;--accent:#3b82f6;--accent2:#2563eb}
  html[data-theme=slate]{--bg:#1a1d21;--panel:#24282e;--panel2:#2d323a;--line:#3a4049;--txt:#e8eaed;--muted:#9aa3ad;--accent:#0ea5e9;--accent2:#0284c7}
  html[data-theme=forest]{--bg:#0e1a14;--panel:#13241b;--panel2:#1a2f23;--line:#274234;--txt:#e6f3ec;--muted:#8fae9d;--accent:#22c55e;--accent2:#16a34a}
  html[data-theme=light] body,html[data-theme=blue] body,html[data-theme=slate] body,html[data-theme=forest] body{background:var(--bg)}
  .mp-theme-sel{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:6px 8px;font-size:12px;font-family:inherit;cursor:pointer;margin-top:10px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:radial-gradient(circle at 30% 10%,#172033,#0f1419);color:var(--txt);min-height:100vh;padding:30px 16px;display:flex;justify-content:center}
  .box{background:var(--panel);border:1px solid var(--line);border-radius:16px;width:100%;max-width:560px;height:fit-content;box-shadow:0 24px 60px rgba(0,0,0,.45);overflow:hidden}
  .head{padding:24px 28px;border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:11px;font-weight:700;font-size:20px}
  .mp-badge{background:#fff;border-radius:13px;padding:13px 22px;display:inline-flex;align-items:center}
  .mp-badge img{display:block;height:74px;width:auto}
  .head p{color:var(--muted);font-size:13px;margin-top:8px}
  .body{padding:24px 28px}
  .field{margin-bottom:16px}
  .field label{display:block;color:var(--muted);font-size:12px;margin-bottom:6px;font-weight:600}
  .field input,.field textarea,.field select{width:100%;background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:9px;padding:11px 13px;font-size:14px;font-family:inherit}
  .field textarea{min-height:120px;resize:vertical}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:600;cursor:pointer;transition:.15s;margin-top:6px}
  .btn:hover{background:var(--accent2)}
  .btn:disabled{opacity:.6;cursor:default}
  .err{color:var(--red);font-size:13px;min-height:18px;margin-top:10px}
  .foot{text-align:center;color:var(--muted);font-size:12px;padding:0 28px 22px}
  .foot a{color:var(--accent);text-decoration:none}
  .success{text-align:center;padding:40px 28px}
  .success .ico{width:64px;height:64px;border-radius:50%;background:rgba(34,197,94,.15);color:var(--green);display:grid;place-items:center;font-size:32px;margin:0 auto 18px}
  .success h2{font-size:20px;margin-bottom:8px}
  .success p{color:var(--muted);font-size:14px;line-height:1.6}
  .success .btn{max-width:240px;margin:22px auto 0}
</style>
<script>
  (function(){var t=localStorage.getItem('mp-theme'); if(t&&t!=='dark') document.documentElement.dataset.theme=t;})();
  function setTheme(v){ if(v&&v!=='dark') document.documentElement.dataset.theme=v; else document.documentElement.removeAttribute('data-theme'); localStorage.setItem('mp-theme', v||'dark'); }
  document.addEventListener('DOMContentLoaded',function(){var s=document.getElementById('themeSel'); if(s) s.value=localStorage.getItem('mp-theme')||'dark';});
</script>
</head>
<body>
<div class="box" id="box">
  <div class="head">
    <div class="brand" style="margin-bottom:6px">
      <span class="mp-badge"><img src="logo.png" alt="MeatPlus Trading Corporation" /></span>
    </div>
    <p style="font-size:15px;color:var(--txt);font-weight:600;margin-top:6px">IT Helpdesk</p>
    <p>Submit a support request. Our IT team will pick it up — no login needed.</p>
  </div>
  <div class="body" id="form">
    <div class="row2">
      <div class="field"><label>Your name *</label><input id="f_name" placeholder="Full name" /></div>
      <div class="field"><label>Your email *</label><input id="f_email" type="email" placeholder="name@meatplus.ph" /></div>
    </div>
    <div class="field"><label>Subject *</label><input id="f_subject" list="f_subjectDL" autocomplete="off" placeholder="Pick a common subject or type your own" /><datalist id="f_subjectDL"></datalist></div>
    <div class="field"><label>Describe the problem</label><textarea id="f_desc" placeholder="What's happening? Any error messages, when it started, what you've tried…"></textarea></div>
    <div class="row2">
      <div class="field"><label>Category</label><select id="f_category"><option>hardware</option><option>software</option><option>network</option><option>account</option><option>email</option><option>security</option><option>access</option><option selected>other</option></select></div>
      <div class="field"><label>How urgent?</label><select id="f_priority"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option><option value="urgent">Urgent</option></select></div>
    </div>
    <div class="field"><label>Attachments (optional)</label><input type="file" id="f_files" multiple accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.csv" style="width:100%;background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:9px;padding:10px;font-size:13px" /><div style="color:var(--muted);font-size:11px;margin-top:4px">Screenshots or documents that show the issue — up to 10 MB each.</div></div>
    <button class="btn" id="submitBtn">Submit ticket</button>
    <div class="err" id="err"></div>
  </div>
  <div class="foot">Already submitted? <a href="status.html">Check ticket status →</a> &nbsp;·&nbsp; IT staff? <a href="index.html">Sign in →</a><br><select class="mp-theme-sel" id="themeSel" title="Color theme" onchange="setTheme(this.value)"><option value="dark">🌙 Dark</option><option value="light">☀️ Light</option><option value="blue">🌌 Midnight</option><option value="slate">🪨 Slate</option><option value="forest">🌲 Forest</option></select></div>
</div>

<script>
// Public form must always post anonymously — use an isolated auth storage key
// and don't persist/inherit any helpdesk login session from the same origin.
const db = supabase.createClient(
  "https://emkcwukiqxnvcbhkjiqz.supabase.co",
  "sb_publishable_u_qnmEI8oHI9Z_A0-Hht3Q_Yvaa7Ork",
  { auth: { persistSession: false, autoRefreshToken: false, detectSessionInUrl: false, storageKey: "mp-public-submit-noauth" } }
);
const $ = s => document.querySelector(s);

async function submitTicket(){
  const name=$("#f_name").value.trim(), email=$("#f_email").value.trim(), subject=$("#f_subject").value.trim();
  $("#err").textContent="";
  if(!name||!email||!subject){ $("#err").textContent="Name, email, and subject are required."; return; }
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ $("#err").textContent="Please enter a valid email address."; return; }
  const files=$("#f_files").files;
  $("#submitBtn").disabled=true; $("#submitBtn").textContent=files.length?"Uploading…":"Submitting…";
  let ref=null;
  if(files.length){
    ref=crypto.randomUUID();
    for(const f of files){
      if(f.size>10485760){ $("#submitBtn").disabled=false; $("#submitBtn").textContent="Submit ticket"; $("#err").textContent=`"${f.name}" is larger than 10 MB.`; return; }
      const safe=f.name.replace(/[^\w.\-]+/g,"_");
      const {error:ue}=await db.storage.from("ticket-files").upload(`tickets/${ref}/${Date.now()}_${safe}`, f, {contentType:f.type||undefined, upsert:false});
      if(ue){ $("#submitBtn").disabled=false; $("#submitBtn").textContent="Submit ticket"; $("#err").textContent=`Couldn't upload "${f.name}": ${ue.message}`; return; }
    }
  }
  const {data:ticketNo,error}=await db.rpc("submit_public_ticket",{
    p_subject:subject, p_description:$("#f_desc").value.trim(),
    p_name:name, p_email:email,
    p_category:$("#f_category").value, p_priority:$("#f_priority").value,
    p_attachment_ref:ref, p_attachment_count:files.length
  });
  $("#submitBtn").disabled=false; $("#submitBtn").textContent="Submit ticket";
  if(error){ $("#err").textContent="Sorry, something went wrong: "+error.message; return; }
  $("#form").style.display="none";
  document.querySelector(".head").style.display="none";
  const box=$("#box");
  box.querySelector(".foot").style.display="none";
  const s=document.createElement("div");
  s.className="success";
  const en=s=>(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  const tn=en(ticketNo||"");
  s.innerHTML=`<div class="ico">✓</div><h2>Ticket submitted!</h2>
    <p>Thanks, ${en(name)}. Your ticket number is <b style="font-family:ui-monospace,monospace;color:#fff">${tn}</b>.<br>The IT team will follow up by email at <b>${en(email)}</b>.</p>
    <p style="color:var(--muted);font-size:12px;margin-top:6px">Save your ticket number — you'll need it (with your email) to check status.</p>
    <a class="btn" style="display:inline-block;max-width:280px;text-decoration:none;margin-top:14px" href="status.html?t=${encodeURIComponent(ticketNo||"")}">Check this ticket's status →</a>
    <button class="btn" style="background:var(--panel2);border:1px solid var(--line);margin-top:10px" onclick="location.reload()">Submit another</button>`;
  box.appendChild(s);
}
// Populate subject choices from the catalog (anon read-only)
(async()=>{
  const {data}=await db.from("ticket_subjects").select("label").eq("active",true).order("usage_count",{ascending:false}).order("label");
  const dl=$("#f_subjectDL");
  if(dl&&data){ const esc=s=>s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); dl.innerHTML=data.map(s=>`<option value="${esc(s.label)}"></option>`).join(""); }
})();

// Auto-fill urgency from the chosen category (admin-defined defaults)
(async()=>{
  const {data}=await db.from("category_urgency").select("*");
  const m={}; (data||[]).forEach(r=>m[r.category]=r.default_priority);
  const apply=()=>{ const p=m[$("#f_category").value]; if(p) $("#f_priority").value=p; };
  $("#f_category").addEventListener("change",apply);
  apply();
})();

$("#submitBtn").onclick=submitTicket;
[ "f_subject","f_email" ].forEach(id=>$("#"+id).addEventListener("keydown",e=>{if(e.key==="Enter")submitTicket();}));
</script>
</body>
</html>
